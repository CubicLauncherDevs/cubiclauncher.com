<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentación - CubicLauncher</title>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.1.0/github-markdown.min.css" media="print"
        onload="this.media='all'">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/docs.css">
    <link rel="icon"
        href="https://raw.githubusercontent.com/CubicLauncher/CubicLauncher/refs/heads/nextUpdate/src/main/resources/com.cubiclauncher.launcher/assets/logos/cubic.png">
</head>

<body>
    <button class="mobile-menu-toggle" id="menuToggle">
        <i class="fa-solid fa-bars"></i>
        <span>Menú</span>
    </button>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-header-top">
                <h2>CubicLauncher</h2>
                <span class="badge-v2">v2</span>
            </div>
            <div class="subtitle">Documentación</div>
        </div>
        <div class="sidebar-search">
            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="searchInput" placeholder="Buscar en la documentación..." autocomplete="off">
            </div>
            <div id="searchResults" class="search-results"></div>
        </div>
        <nav class="sidebar-nav" id="sidebarNav">
            <!-- Navigation will be populated by JavaScript -->
        </nav>
        <div class="sidebar-footer">
            <p>&copy; 2026 CubicLauncher</p>
            <div class="sidebar-links">
                <a href="https://github.com/CubicLauncher" target="_blank"><i class="fa-brands fa-github"></i></a>
                <a href="#"><i class="fa-solid fa-globe"></i></a>
            </div>
        </div>
    </aside>

    <main class="content" id="content">
        <!-- Content will be loaded here -->
        <div class="markdown-body" id="markdownContent">
            Cargando documentación...
        </div>
    </main>


    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <script src="js/markdown-loader.js"></script>
</body>

</html>
